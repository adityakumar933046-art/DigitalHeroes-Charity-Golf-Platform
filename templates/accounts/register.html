{% extends 'base.html' %}

{% block content %}

<section class="hero">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-md-6">

                <div class="glass-card">

                    <h2 class="text-center mb-4">
                        Create Account
                    </h2>

                    <form method="POST">

                        {% csrf_token %}

                        <div class="mb-3">
                            <label>Username</label>
                            <input
                                type="text"
                                name="username"
                                class="form-control"
                                placeholder="Enter Username">
                        </div>

                        <div class="mb-3">
                            <label>Email</label>
                            <input
                                type="email"
                                name="email"
                                class="form-control"
                                placeholder="Enter Email">
                        </div>

                        <div class="mb-3">
                            <label>Password</label>
                            <input
                                type="password"
                                name="password"
                                class="form-control"
                                placeholder="Enter Password">
                        </div>

                        <button
                            type="submit"
                            class="btn btn-primary w-100">

                            Create Account

                        </button>

                    </form>

                    <div class="text-center mt-3">

                        <p>
                            Already have an account?

                            <a href="/accounts/login/"
                               class="text-info">

                               Login

                            </a>

                        </p>

                    </div>

                </div>

            </div>

        </div>

    </div>

</section>

{% endblock %}
