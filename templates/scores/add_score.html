{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="glass-card">

        <h2 class="mb-4">
            Add Score
        </h2>

        {% if error %}

        <div class="alert alert-danger">
            {{ error }}
        </div>

        {% endif %}

        <form method="POST">

            {% csrf_token %}

            <div class="mb-3">

                <label class="form-label">
                    Score
                </label>

                <input
                    type="number"
                    name="score"
                    class="form-control"
                    min="1"
                    max="45"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Date
                </label>

                <input
                    type="date"
                    name="played_on"
                    class="form-control"
                    required>

            </div>

            <button
                type="submit"
                class="btn btn-primary">

                Save Score

            </button>

        </form>

    </div>

</div>

{% endblock %}
